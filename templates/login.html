<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SHUBHAM NX Billing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f3f4f6;
    }

    .login-card {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 380px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a56db;
      text-align: center;
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 0.875rem;
    }

    .form-group input {
      width: 100%;
      min-height: 44px;
      font-size: 16px;
      padding: 0 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
    }

    .btn-login {
      width: 100%;
      min-height: 44px;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      background: #1a56db;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.15s;
    }

    .btn-login:hover {
      background: #1e40af;
    }

    .error-box {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-top: 12px;
    }

    .login-footer {
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      margin-top: 1.75rem;
      padding-top: 1rem;
      border-top: 1px solid #f3f4f6;
    }

    @media (max-width: 480px) {
      .login-card {
        width: 95vw;
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-title">SHUBHAM NX</div>
    <div class="login-subtitle">Billing System</div>

    <form method="POST" action="/login">
      <div class="form-group">
        <input
          type="text"
          name="username"
          placeholder="Username"
          autofocus
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <input
          type="password"
          name="password"
          placeholder="Password"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="btn-login">Login</button>

      {% if error %}
        <div class="error-box">{{ error }}</div>
      {% endif %}
    </form>

    <div class="login-footer">SHUBHAM NX &mdash; Krishna Chowk, New Sangvi, Pune</div>
  </div>

</body>
</html>
