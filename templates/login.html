<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SHUBHAM NX Billing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(150deg, #0f172a 0%, #1e3a8a 60%, #1a56db 100%);
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }

    .login-card {
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.32), 0 4px 16px rgba(0,0,0,0.16);
    }

    .login-accent {
      height: 4px;
      background: linear-gradient(90deg, #1a56db 0%, #60a5fa 100%);
    }

    .login-body {
      padding: 2rem 2.25rem 2.25rem;
    }

    .login-logo-mark {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #1a56db 0%, #3b82f6 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      color: #ffffff;
      margin: 0 auto 14px;
      letter-spacing: -0.3px;
      box-shadow: 0 4px 12px rgba(26, 86, 219, 0.35);
    }

    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      text-align: center;
      margin-bottom: 2px;
    }

    .login-subtitle {
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .form-group {
      margin-bottom: 0.875rem;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 5px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      min-height: 42px;
      font-size: 14px;
      padding: 0 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      outline: none;
      color: #111827;
      background: #f9fafb;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .form-group input:focus {
      border-color: #1a56db;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
    }

    .btn-login {
      width: 100%;
      min-height: 42px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, #1a56db 0%, #2563eb 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(26, 86, 219, 0.35);
    }

    .btn-login:hover {
      opacity: 0.92;
      box-shadow: 0 4px 14px rgba(26, 86, 219, 0.42);
    }

    .error-box {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      margin-top: 12px;
      border: 1px solid #fca5a5;
    }

    .login-footer {
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #f3f4f6;
    }

    @media (max-width: 480px) {
      .login-body {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-accent"></div>
      <div class="login-body">
        <div class="login-logo-mark">SN</div>
        <div class="login-title">SHUBHAM NX</div>
        <div class="login-subtitle">Billing System &mdash; Sign In</div>

        <form method="POST" action="/login">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input
              type="text"
              id="login-username"
              name="username"
              placeholder="Enter your username"
              autofocus
              autocomplete="username"
              required
            />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input
              type="password"
              id="login-password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit" class="btn-login">Sign In</button>

          {% if error %}
            <div class="error-box">{{ error }}</div>
          {% endif %}
        </form>

        <div class="login-footer">SHUBHAM NX &mdash; Krishna Chowk, New Sangvi, Pune</div>
      </div>
    </div>
  </div>

</body>
</html>
