<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bill Not Found — SHUBHAM NX</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f3f4f6;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .icon {
      color: #d1d5db;
      margin-bottom: 20px;
    }

    .heading {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 10px;
    }

    .message {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .bill-ref {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 28px;
      font-family: monospace;
    }

    .btn-home {
      display: inline-block;
      background: #1a56db;
      color: #ffffff;
      text-decoration: none;
      padding: 11px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-home:hover { background: #1648c0; }

    .shop-name {
      margin-top: 28px;
      font-size: 12px;
      color: #9ca3af;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M16 16s-1.5-2-4-2-4 2-4 2"/>
        <line x1="9" y1="9" x2="9.01" y2="9"/>
        <line x1="15" y1="9" x2="15.01" y2="9"/>
      </svg>
    </div>

    <div class="heading">Bill Not Found</div>

    <p class="message">
      This bill link is invalid or the bill may have been deleted.
    </p>

    {% if bill_number %}
    <div class="bill-ref">{{ bill_number }}</div>
    {% endif %}

    <a href="/" class="btn-home">Go to Home</a>

    <div class="shop-name">SHUBHAM NX</div>

  </div>
</body>
</html>
